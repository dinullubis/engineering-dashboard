<script>

const API_URL = "https://script.google.com/macros/s/AKfycbzUzyyEU6KyB3mmp6OiUQYYWCVYU5iLEL8h0NujL5HSXNDfcCbUu8f0h4FnAfRHK1U/exec";

async function loadData() {

  const response = await fetch(API_URL);
  const data = await response.json();

  console.log(data);

  // =========================
  // SUMMARY CARD
  // =========================

  const manpower = [...new Set(data.map(x => x.Nama))].length;

  const hadir = data.filter(x => x.Status === "Hadir").length;

  const sakit = data.filter(x => x.Status === "Sakit").length;

  const totalOT = data.reduce(
    (sum, x) => sum + Number(x["Jam Lembur"] || 0),
    0
  );

  document.getElementById("totalManpower").innerText = manpower;

  document.getElementById("totalHadir").innerText = hadir;

  document.getElementById("totalSakit").innerText = sakit;

  document.getElementById("totalOT").innerText =
    totalOT.toFixed(1);

  // =========================
  // TOP OT PERSON
  // =========================

  const otMap = {};

  data.forEach(x => {

    const nama = x.Nama;
    const jam = Number(x["Jam Lembur"] || 0);

    if (!otMap[nama]) {
      otMap[nama] = 0;
    }

    otMap[nama] += jam;

  });

  const sorted = Object.entries(otMap)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 10);

  const tbody = document.querySelector("#tableData tbody");

  tbody.innerHTML = "";

  sorted.forEach(row => {

    tbody.innerHTML += `
      <tr>
        <td>${row[0]}</td>
        <td>${row[1].toFixed(1)}</td>
      </tr>
    `;

  });

  // =========================
  // CHART
  // =========================

  const ctx = document.getElementById("chartOT");

  new Chart(ctx, {

    type: "bar",

    data: {
      labels: sorted.map(x => x[0]),

      datasets: [{
        label: "Total OT",
        data: sorted.map(x => x[1])
      }]
    }

  });

}

loadData();

</script>
